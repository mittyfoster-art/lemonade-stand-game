<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="lemonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE135"/>
      <stop offset="100%" style="stop-color:#F5A623"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="#1a1a1a"/>
  <!-- Lemon body -->
  <ellipse cx="256" cy="280" rx="140" ry="120" fill="url(#lemonGrad)"/>
  <!-- Lemon highlight -->
  <ellipse cx="220" cy="250" rx="40" ry="30" fill="#FFF5A0" opacity="0.5"/>
  <!-- Leaf -->
  <path d="M 256 160 Q 290 120 320 140 Q 290 170 256 160" fill="url(#leafGrad)"/>
  <path d="M 256 160 Q 222 120 192 140 Q 222 170 256 160" fill="url(#leafGrad)"/>
  <!-- Stem -->
  <rect x="252" y="150" width="8" height="20" rx="2" fill="#8B5A2B"/>
</svg>
